<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保卫 GPA - 极简 2D 塔防</title>
    <style>
        /* 极简 2D 扁平化风格设置 */
        :root {
            --primary-color: #8a1538; /* 沉稳深红 */
            --primary-hover: #a11b43;
            --bg-color: #f4f5f7;      /* 干净的浅灰背景 */
            --text-color: #333333;
            --card-bg: #ffffff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* 顶部横幅 */
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 4rem 1rem;
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 10px;
        }

        /* 主体容器 */
        .container {
            max-width: 800px;
            margin: -2rem auto 2rem auto;
            padding: 0 1rem;
        }

        /* 扁平化卡片 */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid #eaeaea; 
        }

        .card h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 0.5rem;
        }

        /* GitHub 按钮样式 */
        .btn-container {
            text-align: center;
            margin-top: 2rem;
        }

        .github-btn {
            display: inline-block;
            background-color: #24292e;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }

        .github-btn:hover {
            background-color: #000000;
        }

        /* 视频容器 */
        .video-wrapper {
            width: 100%;
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 1rem;
        }

        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<header>
    <h1>保卫 GPA (GPA Defense)</h1>
    <p>《程序设计与实习》课程项目实践</p>
</header>

<div class="container">
    <section class="card">
        <h2>项目简介</h2>
        <p>《保卫 GPA》是一款基于 C++ 与 Qt 框架开发的极简 2D 塔防游戏。为了保持视觉的纯粹与统一，游戏彻底摒弃了复杂的伪 3D 渲染。无论是场景还是防御塔元素（已剥离多余的字母与符号干扰），均采用干净明了的扁平化矢量设计。</p>
        <p>在这里，玩家需要合理布局防线，抵御不断袭来的“DDL 怪物”。本项目由“烫烫烫烫队”共同完成，经历了从需求分析、CMake 环境配置到界面调优的完整周期。</p>
        
        <div class="btn-container">
            <a href="https://github.com/你的用户名/你的仓库名" class="github-btn" target="_blank">
                <svg height="20" width="20" viewBox="0 0 16 16" style="fill: white; vertical-align: text-bottom; margin-right: 8px;">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                获取完整源代码
            </a>
        </div>
    </section>

    <section class="card">
        <h2>实机演示</h2>
        <p>观看下方的实机演示，了解防御塔的部署机制与怪物波次刷新逻辑：</p>
        
        <div class="video-wrapper">
            <video controls preload="metadata">
                <source src="demo.mp4" type="video/mp4">
                您的浏览器不支持视频标签，请升级浏览器或直接下载视频查看。
            </video>
        </div>
    </section>
</div>

</body>
</html>
